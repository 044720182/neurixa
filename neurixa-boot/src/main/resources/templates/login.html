<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neurixa Admin — Login</title>
  <link rel="stylesheet" href="/styles/admin.css">
</head>
<body class="page-login">

  <div class="login-container">
    <h1>Neurixa Admin</h1>
    <p class="brand">Control Panel</p>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               autocomplete="username" placeholder="Enter your username" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               autocomplete="current-password" placeholder="Enter your password" required>
      </div>

      <button type="submit" id="submitBtn" class="btn-login">Login</button>
    </form>

    <div id="errorMessage" class="error-message" role="alert" aria-live="polite"></div>
  </div>

  <!--
    type="module" enables ES Module imports in login.js.
    No inline JS anywhere on this page.
  -->
  <script type="module" src="/js/pages/login.js"></script>
</body>
</html>
