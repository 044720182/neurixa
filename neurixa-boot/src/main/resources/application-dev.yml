spring:
  data:
    mongodb:
      # For @Transactional support, MongoDB must run as a replica set.
      # Standalone mongod silently ignores transactions.
      # Dev replica set setup: see done/ARCHITECTURE.md § Transactional Boundaries
      uri: mongodb://localhost:27017/neurixa
    redis:
      host: 127.0.0.1
      port: 6379

jwt:
  secret: neurixa-dev-secret-key-minimum-256-bits-for-development-only-change-in-production
  validity: 3600000

logging:
  level:
    com.neurixa: DEBUG
    com.neurixa.filter.RequestLoggingFilter: INFO
    com.neurixa.adapter.persistence: DEBUG
    com.neurixa.adapter.files.persistence: DEBUG
  pattern:
    console: "%d{HH:mm:ss} [%X{correlationId:--}] [%X{user:--}] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,beans
  endpoint:
    health:
      show-details: always

neurixa:
  storage:
    local:
      root: /tmp/neurixa-storage-dev
  seed:
    enabled: true       # set false jika tidak mau auto-seed saat startup
    reset-on-start: true   # drop semua users dulu lalu seed ulang setiap startup
